name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npx @vscode/vsce package --allow-missing-repository
      - name: Upload VSIX to release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.vsix"
